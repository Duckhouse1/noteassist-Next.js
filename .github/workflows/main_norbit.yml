# Docs for the Azure Web Apps Deploy action:
# https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure:
# https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Norbit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm

      # Install dependencies (clean + deterministic)
      - name: Install dependencies
        run: npm ci

      # ✅ Generate Prisma Client (THIS FIXES YOUR ERROR)
      - name: Generate Prisma Client
        run: npx prisma generate

      # Build Next.js app
      - name: Build app
        run: npm run build

      # Optional tests
      - name: Run tests
        run: npm run test --if-present

      # Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Download artifact from build job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_226A1220C1FC4E419354950AC612FFD5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0A275869219D454A88A03FAB444C06D9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_12C7C9D172544ED9A83D127A4C007F41 }}

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: Norbit
          slot-name: Production
          package: .
name: Build and deploy Next.js (standalone) to Azure Web App - Norbit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          JIRA_CLIENT_ID: ${{ secrets.JIRA_CLIENT_ID }}
          JIRA_CLIENT_SECRET: ${{ secrets.JIRA_CLIENT_SECRET }}
          CLICKUP_CLIENT_ID: ${{ secrets.CLICKUP_CLIENT_ID }}
          CLICKUP_CLIENT_SECRET: ${{ secrets.CLICKUP_CLIENT_SECRET }}
        run: npm run build

      - name: Verify standalone server exists
        run: |
          echo "== .next/standalone =="
          ls -la .next/standalone
          test -f .next/standalone/server.js
          echo "✅ .next/standalone/server.js exists"

      - name: Create deploy bundle
        run: |
          rm -rf deploy
          cp -R .next/standalone/. deploy/

          node -e "require('fs').writeFileSync('deploy/package.json', JSON.stringify({name:'norbit-standalone',private:true,scripts:{start:'node server.js'}},null,2))"

          echo "== deploy contents =="
          ls -la deploy
          test -f deploy/server.js
          echo "✅ deploy/server.js exists"

      - name: Zip deploy bundle
        run: |
          cd deploy
          zip -r ../deploy.zip .
          cd ..
          ls -la deploy.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Verify zip exists
        run: |
          ls -la
          test -f deploy.zip
          echo "✅ deploy.zip present"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_226A1220C1FC4E419354950AC612FFD5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0A275869219D454A88A03FAB444C06D9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_12C7C9D172544ED9A83D127A4C007F41 }}

      - name: Configure Azure App Service startup
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set \
              --name Norbit \
              --resource-group $(az webapp list --query "[?name=='Norbit'].resourceGroup" -o tsv) \
              --startup-file "node server.js"
            az webapp config appsettings set \
              --name Norbit \
              --resource-group $(az webapp list --query "[?name=='Norbit'].resourceGroup" -o tsv) \
              --settings WEBSITES_PORT=3000

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Norbit
          slot-name: Production
          package: deploy.zip
name: Build and deploy Next.js (standalone) to Azure Web App - Norbit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node 22
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Generate Prisma client
      - name: Generate Prisma Client
        run: npx prisma generate

      # Build Next.js (standalone enabled in next.config.mjs)
      - name: Build app
        run: npm run build

      # Verify standalone output exists
      - name: Verify standalone server exists
        run: |
          echo "== .next/standalone =="
          ls -la .next/standalone || true
          test -f .next/standalone/server.js
          echo "✅ .next/standalone/server.js exists"

      # Create clean deploy folder
      - name: Create deploy bundle
        run: |
          rm -rf deploy
          mkdir -p deploy

          # Copy standalone server files
          cp -R .next/standalone/* deploy/

          # Copy static assets
          mkdir -p deploy/.next
          cp -R .next/static deploy/.next/static

          # Copy public folder if exists
          if [ -d public ]; then
            cp -R public deploy/public
          fi

          # Minimal package.json for Azure runtime
          cat > deploy/package.json << 'EOF'
          {
            "name": "noteassist-standalone",
            "private": true,
            "scripts": {
              "start": "node server.js"
            }
          }
          EOF

          echo "== Deploy folder contents =="
          ls -la deploy
          test -f deploy/server.js
          echo "✅ deploy/server.js exists"

      # Zip deploy bundle (IMPORTANT — forces Azure overwrite)
      - name: Zip deploy bundle
        run: |
          cd deploy
          zip -r ../deploy.zip .
          cd ..
          ls -la deploy.zip

      # Upload zip artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Download zip artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Verify zip exists
        run: |
          ls -la
          test -f deploy.zip
          echo "✅ deploy.zip present"

      # Azure login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_226A1220C1FC4E419354950AC612FFD5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0A275869219D454A88A03FAB444C06D9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_12C7C9D172544ED9A83D127A4C007F41 }}

      # Deploy ZIP to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Norbit
          slot-name: Production
          package: deploy.zip